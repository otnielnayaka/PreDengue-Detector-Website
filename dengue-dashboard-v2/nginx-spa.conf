# ============================================================================
#  Nginx frontend Vue (SPA) + proxy /api ke backend
#  Pakai Docker DNS resolver (127.0.0.11) supaya resolve backend-web saat
#  runtime, bukan saat start (mencegah crash "host not found").
# ============================================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS - resolve hostname container saat runtime
    resolver 127.0.0.11 valid=10s;

    # Proxy /api ke backend-web
    location /api {
        # Pakai variabel supaya nginx TIDAK resolve saat start (anti-crash)
        set $backend "http://backend-web";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
