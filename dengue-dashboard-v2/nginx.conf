# ============================================================================
#  Nginx untuk frontend Vue (SPA)
#  Letakkan di: dengue-dashboard-v2/nginx.conf
# ============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: semua route diarahkan ke index.html
    # (penting untuk Vue Router mode history, mis. /app/map)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy permintaan /api ke container backend-web (Nginx Laravel)
    # Sehingga frontend & backend bisa diakses dari satu origin.
    location /api {
        proxy_pass http://backend-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
