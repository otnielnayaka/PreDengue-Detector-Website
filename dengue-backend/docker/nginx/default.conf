# ============================================================================
#  Nginx untuk Laravel (di dalam container backend-web)
#  Letakkan di: dengue-backend/docker/nginx/default.conf
# ============================================================================

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Docker internal DNS - resolve hostname 'backend' saat runtime (per TTL),
    # bukan sekali saat nginx start. Mencegah fastcgi_pass memakai IP basi
    # kalau container 'backend' di-recreate setelah backend-web sudah jalan.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # Teruskan file .php ke PHP-FPM (container "backend", port 9000)
    location ~ \.php$ {
        # Variabel supaya nginx TIDAK resolve 'backend' sekali saat start
        # (pola sama dengan dengue-dashboard-v2/nginx-spa.conf)
        set $php_upstream backend:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
